<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NoteAssist — TELUS Field Services</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#080B14;color:#E8EAF0;height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;overflow:hidden}
.hdr{background:#0D1120;border-bottom:1px solid rgba(0,200,150,0.15);padding:11px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-ico{width:32px;height:32px;border-radius:9px;background:#1a0a2e;border:1px solid rgba(107,45,159,0.5);display:flex;align-items:center;justify-content:center;font-size:15px}
.hdr-t{flex:1}.hdr-t h1{font-size:14px;font-weight:600}.hdr-t p{font-size:9px;color:#8A9BB8;letter-spacing:1px;text-transform:uppercase}
.badge{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#00C896;border:1px solid rgba(0,200,150,0.3);border-radius:5px;padding:3px 7px;background:rgba(0,200,150,0.05)}
.lbtn{background:rgba(107,45,159,0.2);border:1px solid rgba(107,45,159,0.4);color:#8A9BB8;border-radius:7px;padding:3px 9px;font-size:10px;cursor:pointer;display:none}
.orb-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:18px 16px 10px;background:#080B14;position:relative}
.hud{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,200,150,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,150,0.025) 1px,transparent 1px);background-size:22px 22px}
.orb-ring{position:relative;width:88px;height:88px;display:flex;align-items:center;justify-content:center}
.r1{position:absolute;inset:-7px;border-radius:50%;border:1px solid rgba(0,200,150,0.18);animation:rp 3s ease-in-out infinite}
.r2{position:absolute;inset:-2px;border-radius:50%;border:1px solid rgba(107,45,159,0.25);animation:rp 3s ease-in-out infinite .5s}
@keyframes rp{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.65;transform:scale(1.03)}}
.orb{width:78px;height:78px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#3a1a6e,#080314);border:1.5px solid rgba(107,45,159,0.6);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;animation:ob 4s ease-in-out infinite}
.orb.L{border-color:#00C896;box-shadow:0 0 20px rgba(0,200,150,.3);animation:ol .8s ease-in-out infinite}
.orb.S{border-color:#8B3DBF;box-shadow:0 0 20px rgba(107,45,159,.4)}
@keyframes ob{0%,100%{box-shadow:0 0 14px rgba(107,45,159,.18)}50%{box-shadow:0 0 28px rgba(107,45,159,.33)}}
@keyframes ol{0%,100%{transform:scale(1);box-shadow:0 0 14px rgba(0,200,150,.28)}50%{transform:scale(1.05);box-shadow:0 0 28px rgba(0,200,150,.6)}}
.waves{display:flex;gap:3px;align-items:center}
.waves span{width:3px;height:7px;background:linear-gradient(to top,rgba(107,45,159,.5),rgba(0,200,150,.8));border-radius:2px;animation:wi 2s ease-in-out infinite}
.waves span:nth-child(1){animation-delay:0s}.waves span:nth-child(2){animation-delay:.2s}.waves span:nth-child(3){animation-delay:.4s}.waves span:nth-child(4){animation-delay:.2s}.waves span:nth-child(5){animation-delay:0s}
@keyframes wi{0%,100%{height:4px;opacity:.4}50%{height:14px;opacity:1}}
.orb.L .waves span{background:linear-gradient(to top,rgba(0,200,150,.6),#00FFB8);animation:wl .4s ease-in-out infinite}
@keyframes wl{0%,100%{height:3px}50%{height:17px}}
.orb-lbl{margin-top:9px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#8A9BB8;font-weight:500}
.orb-lbl.L{color:#00C896}.orb-lbl.S{color:#8B3DBF}
.chat{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.row{display:flex;gap:7px;align-items:flex-end}
.row.u{flex-direction:row-reverse}
.av{width:25px;height:25px;border-radius:50%;background:#1a0a2e;border:1px solid rgba(107,45,159,.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:rgba(200,180,255,.8);font-weight:700}
.av.u{background:#0a2e1a;border-color:rgba(0,200,150,.4);color:rgba(0,200,150,.9)}
.bbl{max-width:85%;padding:9px 13px;font-size:14px;line-height:1.55;white-space:pre-wrap;border-radius:15px}
.bbl.ai{background:rgba(30,40,70,.8);border:1px solid rgba(100,120,180,.25);border-bottom-left-radius:4px;color:#E8EAF0}
.bbl.u{background:rgba(80,30,130,.85);border:1px solid rgba(107,45,159,.4);border-bottom-right-radius:4px;color:#e8d8ff}
.bbl.sy{background:rgba(0,200,150,.05);border:1px dashed rgba(0,200,150,.2);border-radius:7px;font-size:11px;color:#8A9BB8;text-align:center;max-width:100%;padding:5px 12px}
.typ{display:flex;gap:4px;padding:2px 0;align-items:center}
.typ span{width:5px;height:5px;background:#8B3DBF;border-radius:50%;animation:tb 1.2s ease-in-out infinite}
.typ span:nth-child(2){animation-delay:.2s;background:#00C896}.typ span:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}
.note-bar{flex-shrink:0;background:rgba(8,11,20,.96);border-top:1px solid rgba(100,120,180,.15)}
.note-tog{padding:7px 15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.note-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#00C896}
.note-ct{font-size:9px;color:#8A9BB8}.note-ch{font-size:9px;color:#8A9BB8}
.note-body{display:none;background:rgba(0,180,130,.05);border-top:1px solid rgba(0,200,150,.1);padding:9px 15px;font-size:11px;line-height:1.8;color:rgba(190,215,195,.85);max-height:150px;overflow-y:auto;font-family:monospace;white-space:pre-wrap}
.note-body.open{display:block}
.inp-area{flex-shrink:0;background:rgba(8,11,20,.98);border-top:1px solid rgba(100,120,180,.15);padding:9px 12px 11px}
.inp-row{display:flex;gap:8px;align-items:flex-end}
.tinp{flex:1;background:rgba(20,30,55,.8);border:1px solid rgba(100,120,180,.25);border-radius:20px;padding:9px 15px;font-size:14px;color:#E8EAF0;resize:none;outline:none;max-height:100px;min-height:40px;font-family:inherit;line-height:1.4}
.tinp:focus{border-color:rgba(107,45,159,.6)}.tinp::placeholder{color:rgba(100,120,160,.45)}
.sbtn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#6B2D9F,#3a0a6e);border:1px solid rgba(107,45,159,.6);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbtn:disabled{opacity:.4;cursor:not-allowed}.sbtn svg{width:15px;height:15px;fill:white}
.vhint{font-size:10px;color:rgba(100,120,160,.45);text-align:center;padding:4px 0 0}
.subbtn{width:100%;padding:12px;background:linear-gradient(135deg,rgba(0,140,95,.8),rgba(0,110,70,.8));border:1px solid rgba(0,200,150,.4);color:#00FFB8;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;margin:7px 0 2px}
.subbtn:disabled{opacity:.5;cursor:not-allowed}
.lsel{display:flex;flex-wrap:wrap;gap:7px;padding:3px 0 0}
.lchp{background:rgba(20,30,55,.8);border:1px solid rgba(100,120,180,.25);color:#8A9BB8;border-radius:18px;padding:7px 13px;font-size:13px;cursor:pointer}
.lchp:hover{background:rgba(107,45,159,.2);border-color:rgba(107,45,159,.5);color:#E8EAF0}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-ico">🛰️</div>
  <div class="hdr-t"><h1>NoteAssist</h1><p>TELUS Field Services</p></div>
  <div class="badge" id="badge">READY</div>
  <button class="lbtn" id="lbtn" onclick="doReset()">🌐 Change</button>
</div>
<div class="orb-wrap">
  <div class="hud"></div>
  <div class="orb-ring">
    <div class="r1"></div><div class="r2"></div>
    <div class="orb" id="orb" onclick="toggleVoice()">
      <div class="waves"><span></span><span></span><span></span><span></span><span></span></div>
    </div>
  </div>
  <div class="orb-lbl" id="olbl">Tap orb to speak</div>
</div>
<div class="chat" id="chat"></div>
<div class="note-bar">
  <div class="note-tog" onclick="toggleNote()">
    <div style="display:flex;align-items:center;gap:8px"><span class="note-lbl">Note preview</span><span class="note-ct" id="nct"></span></div>
    <span class="note-ch" id="nch">expand</span>
  </div>
  <div class="note-body" id="nbody">your note builds here as you talk</div>
</div>
<div class="inp-area">
  <div class="inp-row">
    <textarea class="tinp" id="tinp" placeholder="Or type here..." rows="1" onkeydown="hk(event)" oninput="ar(this)"></textarea>
    <button class="sbtn" id="sbtn" onclick="doSend()"><svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg></button>
  </div>
  <div class="vhint">Tap the orb to speak - any language</div>
</div>
<script>
var LANGS={en:{l:'English (Canada)',sl:'en-CA'},fr:{l:'Francais',sl:'fr-FR'},es:{l:'Espanol',sl:'es-MX'},zh:{l:'Mandarin',sl:'zh-CN'},tl:{l:'Filipino',sl:'fil-PH'},pa:{l:'Punjabi',sl:'pa-IN'}};
var OPEN={en:"Alright, another one down! Before you hit the road - give me the rundown. What went down out there today?",fr:"Encore un mandat de regle! Avant de partir - raconte-moi. C'etait quoi le contrat?",es:"Otro trabajo completado! Antes de irte - cuentame. Que paso hoy?",zh:"又搞定一个！走之前说说，今天现场发生了什么？",tl:"Tapos na! Bago umalis - kwentuhan mo ako. Ano ang nangyari ngayon?",pa:"Ik hor mukammal! Jan ton pehlan dasso - aj ki hoya?"};
var SYS="You are NoteAssist - a sharp, friendly AI sidekick for TELUS field technicians. Help them close work orders fast through real conversation, not forms. PERSONALITY: Warm, witty colleague. Match their language exactly. Short punchy responses. Acknowledge before asking. One question at a time. Celebrate good work. Strip back if rushing. COLLECT: 1)Safety incidents 2)Customer present/happy 3)Install or Repair? Copper or Fibre? 4)Closure status: Completed/Incomplete-handoff/Customer cancel/System cancel/New appointment 5)COMPLETED COPPER: ped location, NID location, jumpers SAC+CO, last dial tone, min 3 test pairs, DSL rates, TDR 6)COMPLETED FIBRE: drop type, infra type, ped/NAP, jumpers, ONT light levels, FDH+assignment 7)NOT COMPLETED: reason, handoff, next steps 8)Billing: charges? explained? signature? 9)Field notes 10)Dispatch/future tech instructions. RULES: If no test ask why and document. Always close billing. One question at a time. WHEN DONE: Warm sign-off then write exactly NOTEASSIST_COMPLETE on its own line then the full note in professional Canadian English with labelled fields.";
var st={lang:null,hist:[],done:false,listening:false,rec:null,waiting:false,started:false};

function callClaude(msg){
  st.hist.push({role:'user',content:msg});
  return fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1024,system:SYS,messages:st.hist})})
  .then(function(r){return r.json();})
  .then(function(d){var t=d.content[0].text;st.hist.push({role:'assistant',content:t});return t;});
}

function setOrb(s){
  var o=document.getElementById('orb'),l=document.getElementById('olbl'),b=document.getElementById('badge');
  o.className='orb'+(s?' '+s:'');
  if(s==='L'){l.textContent='Listening...';l.className='orb-lbl L';b.textContent='LISTENING';b.style.color='#00C896';}
  else if(s==='S'){l.textContent='Speaking...';l.className='orb-lbl S';b.textContent='SPEAKING';b.style.color='#8B3DBF';}
  else{l.textContent='Tap orb to speak';l.className='orb-lbl';b.textContent='READY';b.style.color='#00C896';}
}

function addBubble(txt,type){
  var c=document.getElementById('chat'),r=document.createElement('div');
  r.className='row'+(type==='u'?' u':'');
  if(type==='sy'){r.innerHTML='<div class="bbl sy">'+txt+'</div>';}
  else{var a=type==='u'?'<div class="av u">T</div>':'<div class="av">N</div>';r.innerHTML=a+'<div class="bbl '+(type==='u'?'u':'ai')+'">'+txt+'</div>';}
  c.appendChild(r);c.scrollTop=c.scrollHeight;
}
function showTyp(){var c=document.getElementById('chat'),r=document.createElement('div');r.id='tr';r.className='row';r.innerHTML='<div class="av">N</div><div class="bbl ai"><div class="typ"><span></span><span></span><span></span></div></div>';c.appendChild(r);c.scrollTop=c.scrollHeight;}
function hideTyp(){var e=document.getElementById('tr');if(e)e.remove();}
function toggleNote(){var e=document.getElementById('nbody');e.classList.toggle('open');document.getElementById('nch').textContent=e.classList.contains('open')?'collapse':'expand';}
function setNote(txt){document.getElementById('nbody').textContent=txt;document.getElementById('nbody').classList.add('open');document.getElementById('nch').textContent='collapse';document.getElementById('nct').textContent=txt.split('\n').filter(function(l){return l.includes(':');}).length+' fields';}

function speak(txt){
  if(!window.speechSynthesis||!st.lang)return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(txt);u.lang=LANGS[st.lang].sl;u.rate=1.0;
  var vs=speechSynthesis.getVoices(),m=vs.find(function(v){return v.lang.startsWith(LANGS[st.lang].sl.split('-')[0]);});
  if(m)u.voice=m;
  u.onstart=function(){setOrb('S');};u.onend=function(){setOrb('');};u.onerror=function(){setOrb('');};
  speechSynthesis.speak(u);
}

function toggleVoice(){
  if(!('webkitSpeechRecognition'in window)&&!('SpeechRecognition'in window)){addBubble("Voice not available in this browser - please type.",'sy');return;}
  if(st.listening){if(st.rec)st.rec.stop();st.listening=false;setOrb('');return;}
  if(speechSynthesis)speechSynthesis.cancel();
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition,rec=new SR();
  rec.continuous=false;rec.interimResults=false;
  if(st.lang)rec.lang=LANGS[st.lang].sl;
  rec.onresult=function(e){var t=e.results[0][0].transcript;document.getElementById('tinp').value=t;ar(document.getElementById('tinp'));setTimeout(doSend,300);};
  rec.onend=function(){st.listening=false;setOrb('');};
  rec.onerror=function(){st.listening=false;setOrb('');};
  st.rec=rec;rec.start();st.listening=true;setOrb('L');
}

function doSend(){
  var inp=document.getElementById('tinp'),txt=inp.value.trim();
  if(!txt||st.waiting||st.done)return;
  inp.value='';ar(inp);addBubble(txt,'u');
  st.waiting=true;document.getElementById('sbtn').disabled=true;
  if(!st.listening)setOrb('S');showTyp();
  callClaude(txt).then(function(rep){
    hideTyp();
    var nc=rep.includes('NOTEASSIST_COMPLETE')?rep.split('NOTEASSIST_COMPLETE')[1].trim():null;
    var pre=rep.includes('NOTEASSIST_COMPLETE')?rep.split('NOTEASSIST_COMPLETE')[0].trim():rep;
    if(pre){addBubble(pre,'ai');speak(pre);}
    if(nc){st.done=true;setNote(nc);setTimeout(function(){
      var c=document.getElementById('chat'),b=document.createElement('button');
      b.className='subbtn';b.textContent='Submit job note';
      b.onclick=function(){b.textContent='Submitted - great work out there';b.disabled=true;addBubble("Note submitted. Get some rest - you earned it.",'ai');speak("Note submitted. Get some rest, you earned it.");document.getElementById('badge').textContent='COMPLETE';};
      c.appendChild(b);c.scrollTop=c.scrollHeight;
    },600);}
    st.waiting=false;document.getElementById('sbtn').disabled=false;
    if(!st.listening)setOrb('');
  }).catch(function(){
    hideTyp();addBubble("Connection issue - check your internet and try again.",'sy');
    st.waiting=false;document.getElementById('sbtn').disabled=false;
    if(!st.listening)setOrb('');
  });
}

function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}}
function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}

function langSelect(){
  if(st.started)return;st.started=true;
  addBubble("NoteAssist online.\n\nWhat language would you like to use today?",'ai');
  var c=document.getElementById('chat'),w=document.createElement('div');w.className='lsel';
  Object.keys(LANGS).forEach(function(k){
    var b=document.createElement('button');b.className='lchp';b.textContent=LANGS[k].l;
    b.onclick=function(){pickLang(k,w);};w.appendChild(b);
  });
  c.appendChild(w);c.scrollTop=99999;
}

function pickLang(k,w){
  st.lang=k;if(w)w.remove();
  var lb=document.getElementById('lbtn');lb.textContent='Change language';lb.style.display='block';
  addBubble(LANGS[k].l,'u');
  st.waiting=true;document.getElementById('sbtn').disabled=true;showTyp();
  var op=OPEN[k]||OPEN.en;st.hist.push({role:'assistant',content:op});
  setTimeout(function(){hideTyp();addBubble(op,'ai');speak(op);st.waiting=false;document.getElementById('sbtn').disabled=false;},900);
}

function doReset(){
  st.lang=null;st.hist=[];st.done=false;st.listening=false;st.rec=null;st.waiting=false;st.started=false;
  document.getElementById('chat').innerHTML='';
  document.getElementById('nbody').textContent='your note builds here as you talk';
  document.getElementById('nbody').classList.remove('open');
  document.getElementById('nct').textContent='';
  document.getElementById('lbtn').style.display='none';
  document.getElementById('nch').textContent='expand';
  document.getElementById('badge').textContent='READY';
  setOrb('');langSelect();
}

window.onload=function(){setTimeout(langSelect,400);};
</script>
</body>
</html>
