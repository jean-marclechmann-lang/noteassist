<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NoteAssist — TELUS Field Services</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --tp: #4B286D; --tp-l: #6B3E99; --tg: #2B8000;
    --bg: #F5F3F7; --surface: #FFFFFF; --surface2: #F0EBF5;
    --text: #1A1A1A; --muted: #6B6675; --border: #D8D0E0;
    --ai-bg: #EDE8F5; --ai-border: #C4B8D9;
    --note-bg: #F0F7EE; --note-border: #A8D5A0;
    --danger: #C0392B; --r: 16px; --rs: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1520; --surface: #241E2C; --surface2: #2E2638;
      --text: #F0EBF5; --muted: #9A8FAA; --border: #3E3450;
      --ai-bg: #2E2548; --ai-border: #4E3E70;
      --note-bg: #1A2E1A; --note-border: #2E6E2E;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }
  .header { background: var(--tp); color: white; padding: 14px 18px 12px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .header-logo { width: 28px; height: 28px; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .header-logo svg { width: 18px; height: 18px; }
  .header-text { flex: 1; }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-sub { font-size: 11px; opacity: 0.75; margin-top: 1px; }
  .lang-badge { font-size: 11px; background: rgba(255,255,255,0.2); border-radius: 10px; padding: 3px 8px; }
  .progress-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .tier-pip { flex: 1; height: 4px; border-radius: 2px; background: var(--border); transition: background 0.3s; }
  .tier-pip.active { background: var(--tp); }
  .tier-pip.done { background: var(--tg); }
  .tier-label { font-size: 10px; color: var(--muted); white-space: nowrap; margin-left: 6px; }
  .chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .bubble-row { display: flex; gap: 8px; align-items: flex-end; }
  .bubble-row.user { flex-direction: row-reverse; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--tp); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; color: white; font-weight: 600; }
  .avatar.u { background: var(--tg); }
  .bubble { max-width: 82%; padding: 11px 14px; border-radius: var(--r); font-size: 14px; line-height: 1.5; }
  .bubble.ai { background: var(--ai-bg); border: 1px solid var(--ai-border); border-bottom-left-radius: 4px; color: var(--text); }
  .bubble.user { background: var(--tp); color: white; border-bottom-right-radius: 4px; }
  .bubble.sys { background: #f0f0f0; border: 1px solid var(--border); border-radius: var(--rs); font-size: 12px; color: var(--muted); text-align: center; max-width: 100%; padding: 8px 12px; }
  @media (prefers-color-scheme: dark) { .bubble.sys { background: #2a2a2a; } }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 0 4px 38px; }
  .chip { background: var(--surface); border: 1.5px solid var(--tp); color: var(--tp); border-radius: 20px; padding: 7px 14px; font-size: 13px; cursor: pointer; transition: all 0.15s; font-weight: 500; -webkit-tap-highlight-color: transparent; }
  .chip:active, .chip:hover { background: var(--tp); color: white; }
  .freeform-card { background: var(--surface); border: 1.5px solid var(--tp); border-radius: 14px; padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; margin: 0 0 4px 38px; }
  .freeform-section { display: flex; flex-direction: column; gap: 6px; }
  .freeform-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--tp); }
  .freeform-label.dispatch { color: var(--tg); }
  .freeform-textarea { background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 13px; font-family: inherit; color: var(--text); resize: none; min-height: 72px; line-height: 1.5; outline: none; transition: border-color 0.2s; }
  .freeform-textarea:focus { border-color: var(--tp); }
  .freeform-textarea::placeholder { color: var(--muted); font-style: italic; }
  .freeform-done-btn { align-self: flex-end; background: var(--tp); color: white; border: none; border-radius: 20px; padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .note-panel { background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .note-toggle { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .note-toggle-label { font-size: 12px; font-weight: 600; color: var(--tg); text-transform: uppercase; letter-spacing: 0.5px; }
  .note-toggle-count { font-size: 11px; color: var(--muted); }
  .note-content { display: none; background: var(--note-bg); border-top: 1px solid var(--note-border); padding: 12px 16px; font-size: 12px; line-height: 1.7; color: var(--text); max-height: 160px; overflow-y: auto; font-family: monospace; white-space: pre-wrap; }
  .note-content.open { display: block; }
  .input-row { background: var(--surface); border-top: 1px solid var(--border); padding: 10px 12px; display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
  .text-input { flex: 1; background: var(--bg); border: 1.5px solid var(--border); border-radius: 22px; padding: 10px 14px; font-size: 14px; color: var(--text); resize: none; outline: none; max-height: 100px; min-height: 42px; font-family: inherit; line-height: 1.4; transition: border-color 0.2s; }
  .text-input:focus { border-color: var(--tp); }
  .text-input::placeholder { color: var(--muted); }
  .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--tp); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn svg { width: 18px; height: 18px; fill: white; }
  .voice-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--surface2); border: 1.5px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .voice-btn.listening { background: var(--danger); border-color: var(--danger); animation: pulse 1s ease-in-out infinite; }
  .voice-btn svg { width: 18px; height: 18px; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  .typing { display: flex; gap: 4px; padding: 8px 14px; align-items: center; }
  .typing span { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
  .submit-btn { width: 100%; padding: 14px; background: var(--tg); color: white; border: none; border-radius: var(--rs); font-size: 15px; font-weight: 600; cursor: pointer; margin: 8px 0 4px; }
  .translating-banner { background: var(--surface2); border: 1px solid var(--ai-border); border-radius: var(--rs); padding: 12px 16px; font-size: 13px; color: var(--tp); text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .speaking-indicator { display: none; align-items: center; gap: 6px; padding: 6px 12px; background: var(--surface2); border-radius: 20px; font-size: 12px; color: var(--tp); margin: 0 0 4px 38px; }
  .speaking-indicator.active { display: flex; }
  .speak-wave span { width: 3px; height: 12px; background: var(--tp); border-radius: 2px; display: inline-block; animation: wave 0.8s ease-in-out infinite; margin: 0 1px; }
  .speak-wave span:nth-child(2) { animation-delay: 0.15s; }
  .speak-wave span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes wave { 0%,100%{height:4px} 50%{height:14px} }
</style>
</head>

<div class="header">

    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#4B286D" stroke-width="2.5"/><path d="M8 12h8M12 8v8" stroke="#4B286D" stroke-width="2" stroke-linecap="round"/></svg>

<div class="input-row">

      <path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6"/>
    </svg>
  </button>
  <textarea class="text-input" id="text-input" placeholder="…" rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" onclick="sendAnswer()">
    <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

// ── TTS ────────────────────────────────────────────────────────────────────
function speak(text, onEnd) {
  if (!window.speechSynthesis) { onEnd && onEnd(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  const langConf = LANGS[state.lang || 'en'];
  utt.lang = langConf.speechLang;
  // Try to find a matching voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => langConf.voiceName.some(n => v.name.includes(n)));
  const langMatch = voices.find(v => v.lang.startsWith(langConf.speechLang.split('-')[0]));
  if (preferred) utt.voice = preferred;
  else if (langMatch) utt.voice = langMatch;
  utt.rate = 0.95;
  utt.onend = () => { state.speaking=false; onEnd && onEnd(); };
  utt.onerror = () => { state.speaking=false; onEnd && onEnd(); };
  state.speaking = true;
  window.speechSynthesis.speak(utt);
}

// ── Flow injection ─────────────────────────────────────────────────────────
function injectFlowsAfterStatus(status) {
  const reasonMap = { incomplete:['t3_incomplete_team'], cust_cancel:['t3_cust_cancel'], sys_cancel:['t3_sys_cancel'], new_appt:['t3_new_appt'] };
  if (status !== 'completed') { flowQueue = [...(reasonMap[status]||[])]; return; }
  const t4 = state.techType === 'fibre'
    ? ['t4f_drop','t4f_infra','t4f_ped','t4f_jumpers','t4f_light','t4f_fdh']
    : ['t4c_ped','t4c_nid','t4c_jumpers','t4c_dialtone','t4c_testpairs','t4c_tdr','t4c_dsl'];
  flowQueue = [...t4, 't5_billing'];
}

// ── Note builder ───────────────────────────────────────────────────────────
function buildNote(f) {
  f = f || state.noteFields;
  const lines = [];
  const job = [f.job_family, f.tech_type].filter(Boolean).map(s=>s.toUpperCase()).join(' / ');
  if (job) lines.push(`JOB TYPE: ${job}`);
  if (f.closure_status) lines.push(`STATUS: ${f.closure_status}`);
  lines.push('');
  if (f.safety_incident) lines.push(`SAFETY: ${f.safety_incident}`);
  if (f.customer_present) lines.push(`CUSTOMER: ${f.customer_present}`);
  if (f.handoff_team) lines.push(`HANDOFF: ${f.handoff_team}`);
  if (f.cancel_reason) lines.push(`CANCELLATION REASON: ${f.cancel_reason}`);
  if (f.sys_cancel_reason) lines.push(`SYSTEM CANCEL: ${f.sys_cancel_reason}`);
  if (f.new_appt_details) lines.push(`NEW APPOINTMENT: ${f.new_appt_details}`);
  if (f.ped_location) lines.push(`PED LOCATION: ${f.ped_location}`);
  if (f.nid_location) lines.push(`NID LOCATION: ${f.nid_location}`);
  if (f.jumpers) lines.push(`JUMPERS: ${f.jumpers}`);
  if (f.last_dialtone) lines.push(`LAST WORKING DIAL TONE: ${f.last_dialtone}`);
  if (f.test_pair_results) lines.push(`TEST PAIR RESULTS: ${f.test_pair_results}`);
  if (f.tdr_result) lines.push(`TDR: ${f.tdr_result}`);
  if (f.dsl_rates) lines.push(`DSL RATES: ${f.dsl_rates}`);
  if (f.no_test_reason) lines.push(`TESTS NOT COMPLETED — REASON: ${f.no_test_reason}`);
  if (f.drop_type) lines.push(`DROP TYPE: ${f.drop_type}`);
  if (f.infra_type) lines.push(`INFRASTRUCTURE: ${f.infra_type}`);
  if (f.light_levels) lines.push(`LIGHT LEVELS: ${f.light_levels}`);
  if (f.fdh_assignment) lines.push(`FDH / ASSIGNMENT: ${f.fdh_assignment}`);
  lines.push('');
  if (f.billing_charges) lines.push(`BILLING: ${f.billing_charges}`);
  if (f.billing_detail) lines.push(`CHARGE DETAIL: ${f.billing_detail}`);
  if (f.customer_signature) lines.push(`CUSTOMER SIGNATURE: ${f.customer_signature}`);
  if (f.no_charge_confirmation) lines.push(`NO CHARGE CONFIRMED: ${f.no_charge_confirmation}`);
  if (f.field_notes || f.dispatch_instructions) {
    lines.push('');
    if (f.field_notes) lines.push(`FIELD NOTES:\n${f.field_notes}`);
    if (f.dispatch_instructions) lines.push(`DISPATCH / FUTURE TECH INSTRUCTIONS:\n${f.dispatch_instructions}`);
  }
  return lines.filter((l,i,a)=>!(l===''&&(a[i-1]===''||i===0))).join('\n').trim();
}

function updateNote() {
  const note = buildNote();
  document.getElementById('note-preview').textContent = note || '—';
  const count = Object.keys(state.noteFields).length;
  document.getElementById('note-count').textContent = `${count} field${count!==1?'s':''} captured`;
  if (count > 0) document.getElementById('note-preview').classList.add('open');
}

  if (type==='sys') row.innerHTML=`<div class="bubble sys">${text}</div>`;
  else { const av=type==='user'?`<div class="avatar u">T</div>`:`<div class="avatar">N</div>`; row.innerHTML=`${av}<div class="bubble ${type}">${text}</div>`; }
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

  row.innerHTML=`<div class="avatar">N</div><div class="bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>`;

function askNext(flowKey, delay=500) {
  if (!flowKey) { showFreeForm(); return; }
  if (!Q[flowKey]) { showFreeForm(); return; }
  pendingFlowKey = flowKey;
  const tier = flowKey.startsWith('t1')?1:flowKey.startsWith('t2')?2:flowKey.startsWith('t3')?3:flowKey.startsWith('t4')?4:5;
  updatePips(tier);
  const questionText = L(flowKey);
  const chips = C(flowKey);
  setTimeout(()=>{
    showTyping();
    setTimeout(()=>{
      removeTyping();
      addBubble(questionText, 'ai');
      if(chips) showChips(chips);
      speak(questionText);
    }, 700);
  }, delay);
}

// ── Language selection ─────────────────────────────────────────────────────
function selectLanguage(langKey) {
  state.lang = langKey;
  const conf = LANGS[langKey];
  document.getElementById('lang-badge').textContent = conf.badge;
  document.getElementById('text-input').placeholder = langKey==='en'?'Type or speak in any language…':Q.lang_select[langKey].split('.')[0]+'…';
  askNext(getNextFlow(), 300);
}

function handleLangChip(label) {
  removeChips();
  addBubble(label, 'user');
  const map = { '🇨🇦 English':'en','🇫🇷 Français':'fr','🇪🇸 Español':'es','🇨🇳 普通话':'zh','🇵🇭 Filipino':'tl','🇮🇳 ਪੰਜਾਬੀ':'pa' };
  const key = map[label] || 'en';
  selectLanguage(key);
}

// ── Process answer ─────────────────────────────────────────────────────────
function processAnswer(text) {
  if (!pendingFlowKey) return;
  removeChips();
  addBubble(text, 'user');
  const key = pendingFlowKey.startsWith('t')?({t1_safety:'safety_incident',t1_customer:'customer_present',t2_family:'job_family',t2_tech:'tech_type',t3_status:'closure_status',t3_incomplete_team:'handoff_team',t3_cust_cancel:'cancel_reason',t3_sys_cancel:'sys_cancel_reason',t3_new_appt:'new_appt_details',t4c_ped:'ped_location',t4c_nid:'nid_location',t4c_jumpers:'jumpers',t4c_dialtone:'last_dialtone',t4c_testpairs:'test_pair_results',t4c_tdr:'tdr_result',t4c_dsl:'dsl_rates',t4c_no_test_reason:'no_test_reason',t4f_drop:'drop_type',t4f_infra:'infra_type',t4f_ped:'ped_location',t4f_jumpers:'jumpers',t4f_light:'light_levels',t4f_fdh:'fdh_assignment',t5_billing:'billing_charges',t5_billing_detail:'billing_detail',t5_signature:'customer_signature',t5_no_charge:'no_charge_confirmation'}[pendingFlowKey]):null;
  if(key) { state.noteFields[key]=text; updateNote(); }
  const tl = text.toLowerCase();
  if(key==='job_family') state.jobFamily=tl.includes('repair')||tl.includes('répar')||tl.includes('murm')?'repair':'install';
  if(key==='tech_type') state.techType=(tl.includes('fibre')||tl.includes('fiber')||tl.includes('光纤')||tl.includes('fibra'))?'fibre':'copper';
  if(key==='closure_status'){
    if(tl.includes('incomplet')||tl.includes('handed')||tl.includes('transf')||tl.includes('未完')||tl.includes('hindi tapos')||tl.includes('ਅਧੂਰਾ')) state.closureStatus='incomplete';
    else if(tl.includes('customer')||tl.includes('client')||tl.includes('客户取消')||tl.includes('kansela ng customer')||tl.includes('ਗਾਹਕ')) state.closureStatus='cust_cancel';
    else if(tl.includes('system')||tl.includes('système')||tl.includes('系统')||tl.includes('ਸਿਸਟਮ')) state.closureStatus='sys_cancel';
    else if(tl.includes('appoint')||tl.includes('rendez')||tl.includes('cita')||tl.includes('重新')||tl.includes('bagong')||tl.includes('ਨਵੀਂ')) state.closureStatus='new_appt';
    else state.closureStatus='completed';
    injectFlowsAfterStatus(state.closureStatus);
  }
  if(key==='test_pair_results'&&(tl.includes('no meter')||tl.includes('pas de')||tl.includes('sin metro')||tl.includes('没有')||tl.includes('walang')||tl.includes('ਨਹੀਂ'))) flowQueue.unshift('t4c_no_test_reason');
  if(key==='billing_charges'){
    if(tl.includes('yes')||tl.includes('oui')||tl.includes('sí')||tl.includes('是')||tl.includes('oo')||tl.includes('ਹਾਂ')) flowQueue.unshift('t5_billing_detail','t5_signature');
    else flowQueue.unshift('t5_no_charge');
  }
  askNext(getNextFlow());
}

function handleChip(label) { processAnswer(label); }
function sendAnswer() {
  const input=document.getElementById('text-input');
  const val=input.value.trim(); if(!val) return;
  input.value=''; autoResize(input); processAnswer(val);
}
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAnswer();} }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

// ── Voice ──────────────────────────────────────────────────────────────────
function toggleVoice(){
  const btn=document.getElementById('voice-btn');
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){ addBubble("Voice not supported — please type.", 'sys'); return; }
  if(state.listening){ state.recognition&&state.recognition.stop(); state.listening=false; btn.classList.remove('listening'); return; }
  window.speechSynthesis&&window.speechSynthesis.cancel();
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const rec=new SR(); rec.continuous=false; rec.interimResults=false;
  if(state.lang) rec.lang=LANGS[state.lang].speechLang;
  rec.onresult=(e)=>{ const t=e.results[0][0].transcript; document.getElementById('text-input').value=t; autoResize(document.getElementById('text-input')); };
  rec.onend=()=>{ state.listening=false; btn.classList.remove('listening'); };
  rec.onerror=()=>{ state.listening=false; btn.classList.remove('listening'); };
  state.recognition=rec; rec.start(); state.listening=true; btn.classList.add('listening');
}

// ── Free-form ──────────────────────────────────────────────────────────────
function showFreeForm(){
  state.complete=true; pendingFlowKey=null; updatePips(6);
  const introText=L('freeform_intro');
  setTimeout(()=>{
    showTyping();
    setTimeout(()=>{
      removeTyping();
      addBubble(introText,'ai');
      speak(introText);
      const chat=document.getElementById('chat');
      setTimeout(()=>{
        const card=document.createElement('div');
        card.className='freeform-card';
        const ffLabels={en:['📝 Field notes','🚚 Instructions for dispatch or future tech'],fr:['📝 Notes de terrain','🚚 Instructions pour la répartition ou le prochain tech'],es:['📝 Notas de campo','🚚 Instrucciones para despacho o futuro técnico'],zh:['📝 现场记录','🚚 调度或下位技术员指示'],tl:['📝 Field notes','🚚 Tagubilin para sa dispatch o susunod na tech'],pa:['📝 ਫੀਲਡ ਨੋਟਸ','🚚 ਡਿਸਪੈਚ ਜਾਂ ਅਗਲੇ ਤਕਨੀਸ਼ੀਅਨ ਲਈ ਹਦਾਇਤਾਂ']};
        const doneLabels={en:'Done — finish note',fr:'Terminé — finaliser la note',es:'Listo — finalizar nota',zh:'完成 — 生成记录',tl:'Tapos — tapusin ang note',pa:'ਹੋ ਗਿਆ — ਨੋਟ ਮੁਕੰਮਲ ਕਰੋ'};
        const ll=ffLabels[state.lang]||ffLabels.en;
        card.innerHTML=`<div class="freeform-section"><div class="freeform-label">${ll[0]}</div><textarea class="freeform-textarea" id="ff-notes" placeholder="…"></textarea></div><div class="freeform-section"><div class="freeform-label dispatch">${ll[1]}</div><textarea class="freeform-textarea" id="ff-dispatch" placeholder="…"></textarea></div><button class="freeform-done-btn" onclick="submitFreeForm()">${doneLabels[state.lang]||doneLabels.en}</button>`;
        chat.appendChild(card); chat.scrollTop=chat.scrollHeight;
      },400);
    },800);
  },500);
}

// ── AI translation ─────────────────────────────────────────────────────────
async function translateNoteFields(fields){
  const entries=Object.entries(fields); if(!entries.length) return fields;
  const fieldList=entries.map(([k,v])=>`${k}: ${v}`).join('\n');
  const prompt=`You are a bilingual field services assistant for TELUS.\nTranslate ALL field values below into clear professional Canadian English.\nPreserve all technical terms, numbers, measurements, codes, and addresses exactly.\nReturn ONLY a valid JSON object with the same keys and English-translated values. No preamble, no markdown.\n\n${fieldList}`;
  try {
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    const raw=data.content[0].text.replace(/```json|```/g,'').trim();
    return JSON.parse(raw);
  } catch(e){ return fields; }
}

async function submitFreeForm(){
  const notes=document.getElementById('ff-notes').value.trim();
  const dispatch=document.getElementById('ff-dispatch').value.trim();
  if(notes) state.noteFields['field_notes']=notes;
  if(dispatch) state.noteFields['dispatch_instructions']=dispatch;
  document.querySelector('.freeform-done-btn').disabled=true;
  const chat=document.getElementById('chat');
  const banner=document.createElement('div');
  banner.className='translating-banner';
  banner.innerHTML=`<span class="spin">⟳</span> Translating to English…`;
  chat.appendChild(banner); chat.scrollTop=chat.scrollHeight;
  try {
    const translated=await translateNoteFields(state.noteFields);
    state.noteFields=translated; updateNote();
  } catch(e){}
  banner.remove();
  addBubble('✓ Note compiled', 'user');
  finishInterview();
}

function finishInterview(){
  const completeText=L('complete');
  setTimeout(()=>{
    showTyping();
    setTimeout(()=>{
      removeTyping();
      addBubble(completeText,'ai');
      speak(completeText);
      const chat=document.getElementById('chat');
      const submitLabels={en:'Submit job note ✓',fr:'Soumettre la note ✓',es:'Enviar nota ✓',zh:'提交工单记录 ✓',tl:'Isumite ang job note ✓',pa:'ਜੌਬ ਨੋਟ ਜਮ੍ਹਾਂ ਕਰੋ ✓'};
      const btn=document.createElement('button');
      btn.className='submit-btn'; btn.textContent=submitLabels[state.lang]||submitLabels.en;
      btn.onclick=()=>{
        btn.textContent='✓'; btn.style.background='#1e6600'; btn.disabled=true;
        const submittedText=L('submitted');
        addBubble(submittedText,'ai');
        speak(submittedText);
        document.getElementById('note-preview').classList.add('open');
      };
      chat.appendChild(btn); chat.scrollTop=chat.scrollHeight;
      document.getElementById('note-preview').classList.add('open');
    },1000);
  },400);
}

function toggleNote(){ document.getElementById('note-preview').classList.toggle('open'); }

// ── Boot ───────────────────────────────────────────────────────────────────
window.onload=()=>{
  updateNote();
  // Wait for voices to load then start
  const startIntro=()=>{
    const welcomeText=Q.lang_select.en;
    setTimeout(()=>{
      showTyping();
      setTimeout(()=>{
        removeTyping();
        addBubble(welcomeText,'ai');
        showChips(CHIPS.lang_select.en);
        // Override handleChip for language selection
        document.getElementById('chip-row').querySelectorAll('.chip').forEach(btn=>{
          btn.onclick=()=>handleLangChip(btn.textContent);
        });
        speak(welcomeText);
      },800);
    },500);
  };
  if(window.speechSynthesis){
    if(speechSynthesis.getVoices().length>0) startIntro();
    else { speechSynthesis.onvoiceschanged=startIntro; setTimeout(startIntro,1500); }
  } else { startIntro(); }
};
</script>
