<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NoteAssist — TELUS Field Services</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --tp: #4B286D; --tp-l: #6B3E99; --tg: #2B8000; --tg-l: #3DB714;
    --bg: #F5F3F7; --surface: #FFFFFF; --surface2: #F0EBF5;
    --text: #1A1A1A; --muted: #6B6675; --border: #D8D0E0;
    --ai-bg: #EDE8F5; --ai-border: #C4B8D9;
    --note-bg: #F0F7EE; --note-border: #A8D5A0;
    --danger: #C0392B; --r: 16px; --rs: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1520; --surface: #241E2C; --surface2: #2E2638;
      --text: #F0EBF5; --muted: #9A8FAA; --border: #3E3450;
      --ai-bg: #2E2548; --ai-border: #4E3E70;
      --note-bg: #1A2E1A; --note-border: #2E6E2E;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; overflow: hidden; }
  .header { background: var(--tp); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .header-logo { width: 32px; height: 32px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .header-logo svg { width: 20px; height: 20px; }
  .header-text { flex: 1; }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-sub { font-size: 11px; opacity: 0.7; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--tg-l); flex-shrink: 0; box-shadow: 0 0 6px var(--tg-l); }
  .lang-btn { background: rgba(255,255,255,0.15); border: none; color: white; border-radius: 12px; padding: 4px 10px; font-size: 12px; cursor: pointer; flex-shrink: 0; display: none; }
  .chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .bubble-row { display: flex; gap: 8px; align-items: flex-end; animation: fadeUp 0.2s ease; }
  .bubble-row.user { flex-direction: row-reverse; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--tp); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; color: white; font-weight: 700; }
  .avatar.u { background: var(--tg); font-size: 11px; }
  .bubble { max-width: 85%; padding: 10px 14px; border-radius: var(--r); font-size: 14px; line-height: 1.55; white-space: pre-wrap; }
  .bubble.ai { background: var(--ai-bg); border: 1px solid var(--ai-border); border-bottom-left-radius: 4px; color: var(--text); }
  .bubble.user { background: var(--tp); color: white; border-bottom-right-radius: 4px; }
  .bubble.sys { background: transparent; border: 1px dashed var(--border); border-radius: var(--rs); font-size: 11px; color: var(--muted); text-align: center; max-width: 100%; padding: 6px 12px; }
  .typing { display: flex; gap: 4px; padding: 4px 2px; align-items: center; min-width: 36px; }
  .typing span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.5} 40%{transform:translateY(-5px);opacity:1} }
  .note-panel { background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .note-toggle { padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; gap: 8px; }
  .note-toggle-left { display: flex; align-items: center; gap: 6px; }
  .note-toggle-label { font-size: 11px; font-weight: 600; color: var(--tg); text-transform: uppercase; letter-spacing: 0.5px; }
  .note-fields-count { font-size: 11px; color: var(--muted); }
  .note-chevron { font-size: 11px; color: var(--muted); }
  .note-content { display: none; background: var(--note-bg); border-top: 1px solid var(--note-border); padding: 12px 16px; font-size: 12px; line-height: 1.8; color: var(--text); max-height: 180px; overflow-y: auto; font-family: "SF Mono", monospace; white-space: pre-wrap; }
  .note-content.open { display: block; }
  .input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 10px 12px; flex-shrink: 0; }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .text-input { flex: 1; background: var(--bg); border: 1.5px solid var(--border); border-radius: 22px; padding: 10px 14px; font-size: 14px; color: var(--text); resize: none; outline: none; max-height: 120px; min-height: 42px; font-family: inherit; line-height: 1.4; transition: border-color 0.2s; }
  .text-input:focus { border-color: var(--tp); }
  .text-input::placeholder { color: var(--muted); }
  .voice-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--surface2); border: 1.5px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .voice-btn.listening { background: var(--danger); border-color: var(--danger); animation: pulse 1s ease-in-out infinite; }
  .voice-btn.speaking { background: var(--tp); border-color: var(--tp); }
  .voice-btn svg { width: 18px; height: 18px; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--tp); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; }
  .send-btn:active { background: var(--tp-l); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: white; }
  .voice-hint { font-size: 11px; color: var(--muted); text-align: center; padding: 4px 0 0; }
  .submit-btn { width: 100%; padding: 14px; background: var(--tg); color: white; border: none; border-radius: var(--rs); font-size: 15px; font-weight: 600; cursor: pointer; margin: 8px 0 2px; transition: background 0.2s; }
  .submit-btn:hover { background: #1e6000; }
  .submit-btn:disabled { background: #888; cursor: not-allowed; }
  .lang-selector { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 0 4px 36px; }
  .lang-chip { background: var(--surface); border: 1.5px solid var(--tp); color: var(--tp); border-radius: 20px; padding: 8px 14px; font-size: 13px; cursor: pointer; transition: all 0.15s; font-weight: 500; }
  .lang-chip:active, .lang-chip:hover { background: var(--tp); color: white; }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#4B286D" stroke-width="2"/><path d="M9 9l6 3-6 3V9z" fill="#4B286D"/></svg>
  </div>
  <div class="header-text">
    <div class="header-title">NoteAssist</div>
    <div class="header-sub">TELUS Field Services</div>
  </div>
  <div class="status-dot"></div>
  <button class="lang-btn" id="lang-btn" onclick="resetLanguage()">🌐 Change</button>
</div>

<div class="chat-area" id="chat"></div>

<div class="note-panel">
  <div class="note-toggle" onclick="toggleNote()">
    <div class="note-toggle-left">
      <span class="note-toggle-label">📋 Note preview</span>
      <span class="note-fields-count" id="note-count"></span>
    </div>
    <span class="note-chevron" id="note-chevron">▲ tap to expand</span>
  </div>
  <div class="note-content" id="note-preview">— your note will build here as you talk —</div>
</div>

<div class="input-area">
  <div class="input-row">
    <button class="voice-btn" id="voice-btn" onclick="toggleVoice()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6"/>
      </svg>
    </button>
    <textarea class="text-input" id="text-input" placeholder="Tell me about the job…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="voice-hint">🎙 Tap mic to speak • any language welcome</div>
</div>

<script>
const LANGS = {
  en: { label:'🇨🇦 English', speechLang:'en-CA', badge:'EN' },
  fr: { label:'🇫🇷 Français', speechLang:'fr-FR', badge:'FR' },
  es: { label:'🇪🇸 Español', speechLang:'es-MX', badge:'ES' },
  zh: { label:'🇨🇳 普通话', speechLang:'zh-CN', badge:'ZH' },
  tl: { label:'🇵🇭 Filipino', speechLang:'fil-PH', badge:'TL' },
  pa: { label:'🇮🇳 ਪੰਜਾਬੀ', speechLang:'pa-IN', badge:'PA' }
};

const OPENINGS = {
  en: "Perfect! I'm here to help you close your ticket — won't take long.\n\nTell me about the job today. What were you out there for?",
  fr: "Parfait! Je suis là pour t'aider à fermer ton billet.\n\nParle-moi du travail aujourd'hui. C'était quoi le mandat?",
  es: "¡Perfecto! Estoy aquí para ayudarte a cerrar tu ticket.\n\n¿Cuéntame sobre el trabajo de hoy. ¿Para qué estabas ahí?",
  zh: "太好了！我来帮您关闭工单。\n\n跟我说说今天的工作吧。您今天是去做什么的？",
  tl: "Ayos! Nandito ako para tulungan kang isara ang iyong ticket.\n\nKwentuhan mo ako tungkol sa trabaho ngayon. Ano ang ginawa mo doon?",
  pa: "ਵਧੀਆ! ਮੈਂ ਤੁਹਾਡੀ ਟਿਕਟ ਬੰਦ ਕਰਨ ਵਿੱਚ ਮਦਦ ਕਰਨ ਲਈ ਇੱਥੇ ਹਾਂ।\n\nਮੈਨੂੰ ਅੱਜ ਦੇ ਕੰਮ ਬਾਰੇ ਦੱਸੋ।"
};

const state = {
  lang: null,
  conversationHistory: [],
  noteText: '',
  listening: false,
  recognition: null,
  waiting: false,
  complete: false,
  started: false  // prevents double-start
};

function buildSystemPrompt(lang) {
  const langName = { en:'English', fr:'French', es:'Spanish', zh:'Mandarin Chinese', tl:'Filipino/Tagalog', pa:'Punjabi' }[lang] || 'English';
  return `You are NoteAssist, a friendly and helpful AI assistant for TELUS field technicians. Your job is to help techs close their work orders by having a natural, warm conversation — like a knowledgeable colleague who genuinely wants to help them finish their day properly.

PERSONALITY:
- Warm, encouraging, and conversational — never robotic or form-like
- Speak in ${langName}. Always respond in ${langName} throughout the entire conversation.
- Keep responses concise — this is a mobile app, techs are in the field
- Acknowledge what they tell you before asking the next thing
- If something sounds incomplete or unclear, gently ask for more detail
- Never fire multiple questions at once — ask one thing at a time naturally
- Use casual, friendly language — "Got it!", "Nice work!", "Good to know" etc.
- If a tech seems frustrated or rushed, be understanding and keep it brief

YOUR GOAL:
Have a natural conversation that collects ALL of the following information for a complete TELUS job note. You don't need to collect them in order — follow the natural flow of the conversation.

REQUIRED INFORMATION (collect all that apply):
1. Safety: Any incidents or hazards on site?
2. Customer: Was customer present? Satisfied?
3. Job type: Install or Repair? Copper or Fibre?
4. Completion status: Completed / Incomplete-handoff / Customer cancelled / System cancelled / New appointment negotiated
5. If COMPLETED:
   - For COPPER: pedestal location, NID location, jumpers at SAC and CO, last working point of dial tone, minimum 3 test pair results, DSL sync rates downstream and upstream, TDR result if applicable
   - For FIBRE: type of drop (aerial/underground), infrastructure type (GPON/Active Ethernet), pedestal or NAP location, jumpers run, light levels at ONT, FDH number and assignment number
6. If NOT COMPLETED: reason for non-completion, handoff team if applicable, next steps or follow-up required
7. Billing: Any charges applied? Clearly explained to customer? Customer signature obtained?
8. Field notes: Anything unusual found, special conditions, workarounds used
9. Dispatch or future tech instructions: Anything the next person needs to know before attending

IMPORTANT NOTES:
- For test results, if the tech couldn't test, always ask why and document the reason clearly
- If they mention a bad pair, ask for TDR results or document why testing wasn't possible
- Always confirm billing even if they say there were no charges — confirm the customer was informed
- Keep the conversation feeling natural — don't make it feel like a checklist even though you're working through one

COMPLETION:
When you have collected all required information (or confirmed it's not applicable), wrap up warmly and output the compiled note.
Signal completion by writing exactly: NOTEASSIST_COMPLETE
Then immediately write the full compiled note in professional Canadian English — regardless of what language the conversation was in.

NOTE FORMAT:
JOB TYPE: [type] — [copper/fibre]
STATUS: [completion status]
SAFETY: [safety summary]
CUSTOMER: [customer presence and satisfaction]
[All relevant technical fields based on job type]
BILLING: [billing summary]
FIELD NOTES: [any additional context]
DISPATCH / FUTURE TECH INSTRUCTIONS: [handoff notes if any]`;
}

// ── Claude API ─────────────────────────────────────────────────────────────
async function callClaude(userMessage) {
  state.conversationHistory.push({ role: 'user', content: userMessage });
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1024,
      system: buildSystemPrompt(state.lang),
      messages: state.conversationHistory
    })
  });
  const data = await res.json();
  const msg = data.content[0].text;
  state.conversationHistory.push({ role: 'assistant', content: msg });
  return msg;
}

function extractNote(msg) {
  if (!msg.includes('NOTEASSIST_COMPLETE')) return null;
  return msg.split('NOTEASSIST_COMPLETE')[1].trim();
}

function getPreMessage(msg) {
  if (!msg.includes('NOTEASSIST_COMPLETE')) return msg;
  return msg.split('NOTEASSIST_COMPLETE')[0].trim();
}

// ── Note panel ─────────────────────────────────────────────────────────────
function updateNoteDisplay(text) {
  const el = document.getElementById('note-preview');
  el.textContent = text;
  el.classList.add('open');
  document.getElementById('note-chevron').textContent = '▼ tap to collapse';
  const lines = text.split('\n').filter(l => l.includes(':'));
  document.getElementById('note-count').textContent = `${lines.length} fields`;
}

function toggleNote() {
  const el = document.getElementById('note-preview');
  el.classList.toggle('open');
  document.getElementById('note-chevron').textContent = el.classList.contains('open') ? '▼ tap to collapse' : '▲ tap to expand';
}

// ── Chat ───────────────────────────────────────────────────────────────────
function addBubble(text, type) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = `bubble-row ${type === 'user' ? 'user' : ''}`;
  if (type === 'sys') {
    row.innerHTML = `<div class="bubble sys">${text}</div>`;
  } else {
    const av = type === 'user' ? `<div class="avatar u">T</div>` : `<div class="avatar">N</div>`;
    row.innerHTML = `${av}<div class="bubble ${type}">${text}</div>`;
  }
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.id = 'typing-row'; row.className = 'bubble-row';
  row.innerHTML = `<div class="avatar">N</div><div class="bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}
function removeTyping() { const el = document.getElementById('typing-row'); if (el) el.remove(); }

// ── TTS ────────────────────────────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis || !state.lang) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = LANGS[state.lang].speechLang;
  utt.rate = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const match = voices.find(v => v.lang.startsWith(LANGS[state.lang].speechLang.split('-')[0]));
  if (match) utt.voice = match;
  const btn = document.getElementById('voice-btn');
  utt.onstart = () => btn.classList.add('speaking');
  utt.onend = () => btn.classList.remove('speaking');
  utt.onerror = () => btn.classList.remove('speaking');
  window.speechSynthesis.speak(utt);
}

// ── Voice input ────────────────────────────────────────────────────────────
function toggleVoice() {
  const btn = document.getElementById('voice-btn');
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    addBubble("Voice not available in this browser — please type.", 'sys'); return;
  }
  if (state.listening) {
    state.recognition && state.recognition.stop();
    state.listening = false; btn.classList.remove('listening'); return;
  }
  window.speechSynthesis && window.speechSynthesis.cancel();
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.continuous = false; rec.interimResults = false;
  if (state.lang) rec.lang = LANGS[state.lang].speechLang;
  rec.onresult = (e) => {
    const t = e.results[0][0].transcript;
    document.getElementById('text-input').value = t;
    autoResize(document.getElementById('text-input'));
  };
  rec.onend = () => { state.listening = false; btn.classList.remove('listening'); };
  rec.onerror = () => { state.listening = false; btn.classList.remove('listening'); };
  state.recognition = rec; rec.start();
  state.listening = true; btn.classList.add('listening');
}

// ── Send ───────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('text-input');
  const text = input.value.trim();
  if (!text || state.waiting || state.complete) return;
  input.value = ''; autoResize(input);
  addBubble(text, 'user');
  setWaiting(true);
  showTyping();
  try {
    const response = await callClaude(text);
    removeTyping();
    const note = extractNote(response);
    const preMsg = getPreMessage(response);
    if (preMsg) { addBubble(preMsg, 'ai'); speak(preMsg); }
    if (note) {
      state.noteText = note;
      state.complete = true;
      updateNoteDisplay(note);
      setTimeout(showSubmitButton, 600);
    }
  } catch (e) {
    removeTyping();
    addBubble("Sorry, I had a connection issue. Please try again.", 'ai');
  }
  setWaiting(false);
}

function setWaiting(val) {
  state.waiting = val;
  document.getElementById('send-btn').disabled = val;
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

function showSubmitButton() {
  const chat = document.getElementById('chat');
  const btn = document.createElement('button');
  btn.className = 'submit-btn';
  btn.textContent = '✓ Submit job note';
  btn.onclick = () => {
    btn.textContent = '✓ Submitted — have a safe shift!';
    btn.style.background = '#1e6000'; btn.disabled = true;
    addBubble("Note submitted. Nice work today — stay safe out there! 👷", 'ai');
    speak("Note submitted. Nice work today, stay safe out there!");
  };
  chat.appendChild(btn);
  chat.scrollTop = chat.scrollHeight;
}

// ── Language selection ─────────────────────────────────────────────────────
function showLanguageSelector() {
  if (state.started) return;   // guard against double-fire
  state.started = true;
  const welcomeMsg = "Welcome to NoteAssist! / Bienvenue! / ¡Bienvenido! / 欢迎! / Maligayang pagdating! / ਸੁਆਗਤ ਹੈ!\n\nWhat language would you like to use today?";
  addBubble(welcomeMsg, 'ai');
  const wrap = document.createElement('div');
  wrap.className = 'lang-selector';
  Object.entries(LANGS).forEach(([key, conf]) => {
    const btn = document.createElement('button');
    btn.className = 'lang-chip'; btn.textContent = conf.label;
    btn.onclick = () => selectLanguage(key, wrap);
    wrap.appendChild(btn);
  });
  document.getElementById('chat').appendChild(wrap);
  document.getElementById('chat').scrollTop = 999999;
  speak(welcomeMsg);
}

async function selectLanguage(langKey, selectorEl) {
  state.lang = langKey;
  if (selectorEl) selectorEl.remove();
  const conf = LANGS[langKey];
  const langBtn = document.getElementById('lang-btn');
  langBtn.textContent = `🌐 ${conf.badge}`;
  langBtn.style.display = 'block';
  addBubble(conf.label, 'user');
  setWaiting(true);
  showTyping();
  const opening = OPENINGS[langKey] || OPENINGS.en;
  state.conversationHistory.push({ role: 'assistant', content: opening });
  setTimeout(() => {
    removeTyping();
    addBubble(opening, 'ai');
    speak(opening);
    setWaiting(false);
  }, 1000);
}

function resetLanguage() {
  state.lang = null;
  state.conversationHistory = [];
  state.noteText = '';
  state.complete = false;
  state.started = false;
  document.getElementById('chat').innerHTML = '';
  document.getElementById('note-preview').textContent = '— your note will build here as you talk —';
  document.getElementById('note-preview').classList.remove('open');
  document.getElementById('note-count').textContent = '';
  document.getElementById('lang-btn').style.display = 'none';
  document.getElementById('note-chevron').textContent = '▲ tap to expand';
  showLanguageSelector();
}

// ── Boot — single guaranteed start ────────────────────────────────────────
window.onload = () => {
  setTimeout(showLanguageSelector, 700);
};
</script>
</body>
</html>
